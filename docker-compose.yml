# RossBot local infra: PostgreSQL and Redis.
# Dev/demo uses standard postgres:17 (no TimescaleDB needed — migration skips hypertables
# when the extension is absent). For production use timescale/timescaledb-ha:pg17.
#   redis 8 — redis-py 8.x speaks RESP3 (hub.docker.com/_/redis).
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: rossbot
      POSTGRES_PASSWORD: rossbot
      POSTGRES_DB: rossbot
    ports:
      - "5432:5432"
    volumes:
      - rossbot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rossbot -d rossbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.0.1
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - rossbot_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rossbot_pgdata:
  rossbot_redisdata:
